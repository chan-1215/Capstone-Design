<!DOCTYPE	html>
<html	lang="ko">
<head>
<meta	charset="UTF-8">
<meta	name="viewport"	content="width=device-width,	initial-scale=1.0">	
<!--	스마트폰	화면에	딱	맞게	조절	-->
<title>AI-Rover	관제	센터</title>
<style>
body	{	text-align:	center;	background-color:	#2c3e50;	color:	white;	
font-family:	sans-serif;	}
.video-container	{	margin:	20px	auto;	border:	3px	solid	#f1c40f;	
width:	320px;	}
.control-pad	{	margin-top:	20px;	}
button	{	
width:	80px;	height:	60px;	font-size:	18px;	margin:	5px;	
background-color:	#3498db;	color:	white;	border:	none;	
border-radius:	10px;
}
button:active	{	background-color:	#2980b9;	}
.capture-btn	{	width:	260px;	background-color:	#e74c3c;	margin-top:
     	 	 	 	.capture-btn:active	{	background-color:	#c0392b;	}
 	 	</style>
 	 	<script>
 	 	 	 	//	서버로	조종	명령을	몰래(비동기)	보내는	자바스크립트	함수
 	 	 	 	function	sendCommand(cmd)	{
 	 	 	 	 	 	fetch('/action/'	+	cmd);
 	 	 	 	}
 	 	 	 	
 	 	 	 	//	데이터	수집(찰칵)	명령을	보내고	서버의	응답을	알림창으로	띄움
 	 	 	 	function	captureImage()	{
 	 	 	 	 	 	fetch('/capture')
 	 	 	 	 	 	 	 	.then(response	=>	response.text())
 	 	 	 	 	 	 	 	.then(msg	=>	alert(msg));
 	 	 	 	}
 	 	</script>
</head>
<body>
 	 	<h2>￿ AI-Rover	관제	센터</h2>
 	 	
 	 	<!--	실시간	카메라	영상이	출력되는	곳	-->
 	 	<div	class="video-container">
 	 	 	 	<img	src="{{	url_for('video_feed')	}}"	width="320"	height="240"	
alt="Video	Stream">
 	 	</div>
 	 	<!--	스마트폰	터치	및	마우스	클릭	대응	조종	패드	(누를	때	이동,	뗄	때	정
지)	-->
 	 	<div	class="control-pad">
 	 	 	 	<button	onmousedown="sendCommand('forward')"	
onmouseup="sendCommand('stop')"
 	 	 	 	 	 	 	 	ontouchstart="sendCommand('forward')"	
ontouchend="sendCommand('stop')">전진(W)</button><br>
 	 	 	 	
 	 	 	 	<button	onmousedown="sendCommand('left')"	
onmouseup="sendCommand('stop')"
 	 	 	 	 	 	 	 	ontouchstart="sendCommand('left')"	
ontouchend="sendCommand('stop')">좌(A)</button>
 	 	 	 	<button	onmousedown="sendCommand('backward')"	
onmouseup="sendCommand('stop')"
 	 	 	 	 	 	 	 	ontouchstart="sendCommand('backward')"	
ontouchend="sendCommand('stop')">후진(S)</button>
 	 	 	 	<button	onmousedown="sendCommand('right')"	
onmouseup="sendCommand('stop')"
 	 	 	 	 	 	 	 	ontouchstart="sendCommand('right')"	
ontouchend="sendCommand('stop')">우(D)</button>
 	 	</div>
 	 	<!--	딥러닝(YOLO)	학습용	데이터	수집	버튼	-->
 	 	<button	class="capture-btn"	onclick="captureImage()">데이터	수집	(찰칵!)</button>
</body>
</html>
